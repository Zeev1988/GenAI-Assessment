version: 1
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels: ["dependencies", "python"]
    groups:
      azure-sdks:
        patterns:
          - "azure-*"
      lint-and-test:
        patterns:
          - "ruff"
          - "pytest*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
